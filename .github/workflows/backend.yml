name: Backend CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check app/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: flaam
          POSTGRES_PASSWORD: password
          POSTGRES_DB: flaam_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flaam"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      APP_ENV: test
      APP_DEBUG: "true"
      SECRET_KEY: "ci-secret-key-64-chars-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
      DATABASE_URL: postgresql+asyncpg://flaam:password@localhost:5432/flaam_test
      TEST_DATABASE_URL: postgresql+asyncpg://flaam:password@localhost:5432/flaam_test
      REDIS_URL: redis://localhost:6379/0
      TEST_REDIS_URL: redis://localhost:6379/15
      SMS_SIMULATE: "true"
      STORAGE_ROOT: /tmp/flaam-uploads
      PUBLIC_BASE_URL: http://localhost:8000
      CORS_ORIGINS: http://localhost:3000
      TERMII_API_KEY: ci-placeholder
      TERMII_SENDER_ID: Flaam
      PAYSTACK_SECRET_KEY: ci-placeholder
      PAYSTACK_WEBHOOK_SECRET: ci-placeholder
      CELERY_BROKER_URL: redis://localhost:6379/4
      CELERY_RESULT_BACKEND: redis://localhost:6379/3
      FCM_SERVICE_ACCOUNT_JSON: /tmp/fcm.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Alembic upgrade head
        run: alembic upgrade head

      - name: Run pytest
        run: pytest -x --tb=short -q
