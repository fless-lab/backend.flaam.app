services:
  api:
    build: .
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - uploads_data:/app/uploads
    restart: unless-stopped

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: flaam
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flaam
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flaam"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Worker Celery : consomme les tâches enfilées par l'API (photos
  # modération, RGPD purge, etc.) et celles planifiées par beat.
  celery-worker:
    build: .
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - uploads_data:/app/uploads
    restart: unless-stopped

  # Beat scheduler : enfile les tâches périodiques (feeds 3h, reminders,
  # cleanup, emergency-sms, etc.). Un seul conteneur dans toute la stack.
  celery-beat:
    build: .
    command: celery -A app.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - celery-worker
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:
