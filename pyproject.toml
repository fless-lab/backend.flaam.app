[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
asyncio_default_fixture_loop_scope = "session"

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E7", "E9", "F", "W6"]
ignore = ["E402", "E501", "F401"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*" = ["F401", "F811"]
"alembic/*" = ["E402", "F401"]